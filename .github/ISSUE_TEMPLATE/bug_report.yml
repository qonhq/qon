name: Bug report
description: Report a reproducible problem in Qon
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened and what did you expect?
      placeholder: Briefly describe the bug and expected behavior.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Qon version
      description: Which version or commit are you using?
      placeholder: v0.x or commit SHA
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Linux
        - macOS
        - Windows
        - Other
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction steps
      description: Minimal steps to reproduce the issue.
      placeholder: |
        1. Run ...
        2. Send request ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs/output
      description: Paste logs, stack traces, or command output.
      render: shell
  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Any extra details, screenshots, or links.
