name: Feature request
description: Propose an enhancement for Qon
labels: ["enhancement", "needs-triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What problem are you trying to solve?
      placeholder: Describe the limitation or pain point.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What should Qon do?
      placeholder: Describe the API, behavior, or UX you want.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you considered.
  - type: dropdown
    id: impact
    attributes:
      label: Expected impact
      options:
        - Low
        - Medium
        - High
    validations:
      required: true
  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Benchmarks, references, or prior art.
